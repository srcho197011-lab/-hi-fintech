/* ====================== AI 주치의 ====================== */
/* ── 국가건강정보포털(health.kdca.go.kr) 기반 건강 지식베이스 ── */

/* ── 국가건강정보포털 전체 코퍼스(664개) — data/kdca.json 1회 로드 ── */
let _kdcaPromise = null;
function loadKdca() {
  if (!_kdcaPromise) {
    _kdcaPromise = fetch("./data/kdca.json")
      .then((r) => { if (!r.ok) throw new Error("KB 로드 실패 (" + r.status + ")"); return r.json(); })
      .catch(() => null); // 실패 시 큐레이션 KB로 폴백
  }
  return _kdcaPromise;
}
function useKdca() {
  const [kb, setKb] = useState(null);
  useEffect(() => { let on = true; loadKdca().then((d) => on && setKb(d)); return () => { on = false; }; }, []);
  return kb;
}
/* ── 질병관리청 학습용 Q&A 데이터셋(1,947쌍) — data/kdca_qa.json 1회 로드 ── */
let _qaPromise = null;
function loadQA() {
  if (!_qaPromise) {
    _qaPromise = fetch("./data/kdca_qa.json").then((r) => r.ok ? r.json() : null).catch(() => null);
  }
  return _qaPromise;
}
function useQA() {
  const [qa, setQa] = useState(null);
  useEffect(() => { let on = true; loadQA().then((d) => on && setQa(d)); return () => { on = false; }; }, []);
  return qa;
}
/* ── 임상 진료지침/환자 리플릿 학습 Q&A — data/guidelines.json 1회 로드 ── */
let _glPromise = null;
function loadGuidelines() {
  if (!_glPromise) _glPromise = fetch("./data/guidelines.json").then((r) => r.ok ? r.json() : null).catch(() => null);
  return _glPromise;
}
function useGuidelines() {
  const [g, setG] = useState(null);
  useEffect(() => { let on = true; loadGuidelines().then((d) => on && setG(d)); return () => { on = false; }; }, []);
  return g;
}
// 진료지침(우선) + 질병관리청 Q&A 병합 — 같은 질환은 진료지침이 먼저 매칭
function useLearnedQA() {
  const qa = useQA();
  const gl = useGuidelines();
  return useMemo(() => {
    if (!qa && !gl) return null;
    return { meta: { count: ((gl && gl.qa) ? gl.qa.length : 0) + ((qa && qa.qa) ? qa.qa.length : 0), qaCount: (qa && qa.meta) ? qa.meta.count : 0, glCount: (gl && gl.meta) ? gl.meta.count : 0 }, qa: [...((gl && gl.qa) || []), ...((qa && qa.qa) || [])] };
  }, [qa, gl]);
}
// 동의어·구어 → 표준 질환키 확장(질문에 별칭이 있으면 표준키를 덧붙여 매칭률↑)
const QA_ALIAS = {
  "이상지질혈증": ["콜레스테롤", "중성지방", "고지혈", "ldl", "hdl", "엘디엘", "기름기"],

  "당뇨병": ["당뇨", "혈당", "당화혈색소", "당수치"],
  "만성콩팥병": ["콩팥", "신부전", "사구체"],
  "만성폐쇄성폐질환": ["copd", "폐쇄성폐", "만성폐쇄"],

function BioTrendChart() {
  const years = ["2021.12", "2022.12", "2023.12", "2024.12"];
  const reg = [51.1, 52.1, 53.1, 54.1];
  const bio = [51.4, 51.9, 52.4, 52.5];
  const W = 540, H = 196, padX = 34, padTop = 16, padBot = 30, min = 50.5, max = 55;
  const x = (i) => padX + i * (W - padX * 2) / (years.length - 1);
  const y = (v) => padTop + (max - v) / (max - min) * (H - padTop - padBot);
  const path = (arr) => arr.map((v, i) => `${i ? "L" : "M"}${x(i)},${y(v)}`).join(" ");
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
      {[51, 52, 53, 54, 55].map((g) => (<g key={g}><line x1={padX} x2={W - padX} y1={y(g)} y2={y(g)} stroke="#EEF1F8" /><text x={padX - 8} y={y(g) + 3} textAnchor="end" fontSize="9" fill="#9AA6BC">{g}</text></g>))}
      <path d={path(reg)} fill="none" stroke="#94A3B8" strokeWidth="2" strokeDasharray="4 4" />
      <path d={path(bio)} fill="none" stroke="#2F5BEA" strokeWidth="2.5" strokeLinecap="round" />
      {reg.map((v, i) => <circle key={i} cx={x(i)} cy={y(v)} r="3" fill="#94A3B8" />)}
      {bio.map((v, i) => <circle key={i} cx={x(i)} cy={y(v)} r={i === bio.length - 1 ? 5 : 3.5} fill="#fff" stroke="#2F5BEA" strokeWidth="2.5" />)}
      {bio.map((v, i) => <text key={i} x={x(i)} y={y(v) - 9} textAnchor="middle" fontSize="10" fontWeight="700" fill="#1E40C8">{v}</text>)}
      {years.map((yr, i) => <text key={i} x={x(i)} y={H - 10} textAnchor="middle" fontSize="9.5" fill="#9AA6BC">{yr}</text>)}
    </svg>
  );
}

/* ====================== 병원/예약 (심평원 공공데이터 연동) ====================== */
let _hiraPromise = null;
function loadHira() {
  if (!_hiraPromise) {
    _hiraPromise = fetch("./data/hira.json").then((r) => {
      if (!r.ok) throw new Error("데이터 로드 실패 (" + r.status + ")");
      return r.json();
    });
  }
  return _hiraPromise;
}
function useHira() {
  const [state, setState] = useState({ loading: true, error: null, data: null });
  useEffect(() => {
    let on = true;
    loadHira().then((d) => on && setState({ loading: false, error: null, data: d }))
      .catch((e) => on && setState({ loading: false, error: e.message, data: null }));
    return () => { on = false; };
  }, []);
  return state;
}
const SIDO_ORDER = ["서울", "경기", "인천", "부산", "대구", "대전", "광주", "울산", "세종시", "강원", "충북", "충남", "전북", "전남", "경북", "경남", "제주"];
const TYPE_PRIORITY = ["상급종합", "종합병원", "병원", "요양병원", "한방병원", "치과병원", "의원", "한의원", "치과의원", "정신병원", "조산원", "보건의료원", "보건소", "보건지소", "보건진료소"];
const tpri = (t) => { const i = TYPE_PRIORITY.indexOf(t); return i < 0 ? 99 : i; };
const mapsHref = (q) => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
const MAP_CAP = 1000;
const escHtml = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

// 약국 운영정보(데모·추정): 심평원 기본데이터엔 운영시간이 없어 약국명 기반 결정적 해시로 생성.
function pharmOps(name, sgg) {
  let h = 0; const s = (name || "") + (sgg || "");
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  const night = h % 7 === 0;
  const holiday = h % 4 === 0;
  const open = ["08:30", "09:00", "09:30"][h % 3];
  const close = night ? "24:00" : ["18:00", "18:30", "19:00", "20:00"][(h >> 3) % 4];
  const sat = (h >> 5) % 3 === 0 ? "토 휴무" : "토 09:00~13:00";
  return { night, holiday, weekday: `${open}~${close}`, sat };
}

// 외부 링크는 실제 배포 도메인에서만 노출(미리보기 localhost는 외부 이동을 차단하므로 숨김).
const EXTERNAL_OK = typeof location !== "undefined" && !/^(localhost|127\.0\.0\.1)$/i.test(location.hostname);
const directionsHref = (lat, lng) => `https://www.openstreetmap.org/directions?to=${lat}%2C${lng}`;
const normUrl = (u) => { if (!u) return ""; const s = String(u).trim(); return /^https?:\/\//i.test(s) ? s : "http://" + s; };
// 심평원 등록 홈페이지 중 'http://'만 있거나 도메인이 없는 쓰레기값 제외.
const validHomepage = (u) => { if (!u) return false; const s = String(u).trim().replace(/^https?:\/\//i, ""); return /[.][a-z가-힣]{2,}/i.test(s); };
// 공식 홈페이지가 없는 병원도 정보를 참고할 수 있는 네이버 검색 링크(병원마다 생성).
const naverHref = (name, region) => `https://search.naver.com/search.naver?query=${encodeURIComponent((name + " " + (region || "")).trim())}`;
const popupLink = (lat, lng) => EXTERNAL_OK ? `<br><a href="${directionsHref(lat, lng)}" target="_blank" rel="noreferrer" style="color:#2563EB;font-weight:700">길찾기(새 창) ›</a>` : "";

// Leaflet(OpenStreetMap) 지도 — window.L (UMD)로 로드, 마커클러스터 있으면 사용.
function MapView({ points, accent, focus, height }) {
  const ref = useRef(null);
  const mapRef = useRef(null);
  const layerRef = useRef(null);
  const valid = React.useMemo(() => (points || []).filter((p) => p.lat && p.lng).slice(0, MAP_CAP), [points]);
  useEffect(() => {
    const L = window.L;
    if (!L || !ref.current) return;
    if (!mapRef.current) {
      mapRef.current = L.map(ref.current, { scrollWheelZoom: false }).setView([36.5, 127.8], 7);
      mapRef.current.attributionControl.setPrefix(false);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "&copy; OpenStreetMap" }).addTo(mapRef.current);
    }
    const map = mapRef.current;
    if (layerRef.current) { map.removeLayer(layerRef.current); layerRef.current = null; }
    const group = L.markerClusterGroup ? L.markerClusterGroup({ chunkedLoading: true, maxClusterRadius: 50 }) : L.layerGroup();
    const bounds = [];
    valid.forEach((p) => {
      const m = L.marker([p.lat, p.lng]);
      m.bindPopup(`<div style="font-size:12.5px;line-height:1.5;min-width:150px"><b>${escHtml(p.name)}</b>${p.tag ? ` <span style="color:${accent || "#2563EB"};font-weight:700">· ${escHtml(p.tag)}</span>` : ""}<br>${escHtml(p.addr)}${p.tel ? `<br>☎ ${escHtml(p.tel)}` : ""}${popupLink(p.lat, p.lng)}</div>`);
      group.addLayer(m); bounds.push([p.lat, p.lng]);
    });
    group.addTo(map); layerRef.current = group;
    if (bounds.length) map.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 });
    const t = setTimeout(() => map.invalidateSize(), 60);
    return () => clearTimeout(t);
  }, [valid, accent]);
  // 특정 위치로 포커스(카드의 '지도에서 보기' 클릭 시) — 외부 이동 없이 앱 내부 지도에서 처리.
  useEffect(() => {
    const L = window.L;
    if (!L || !mapRef.current || !focus || !focus.lat || !focus.lng) return;
    const map = mapRef.current;
    map.invalidateSize();
    map.setView([focus.lat, focus.lng], 16, { animate: true });
    L.popup({ offset: [0, -4] }).setLatLng([focus.lat, focus.lng])
      .setContent(`<div style="font-size:12.5px;line-height:1.5"><b>${escHtml(focus.name)}</b>${focus.addr ? `<br>${escHtml(focus.addr)}` : ""}${popupLink(focus.lat, focus.lng)}</div>`).openOn(map);
  }, [focus]);
  useEffect(() => () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } }, []);
  if (!window.L) return <div className="hload" style={{ marginTop: 0 }}>지도를 불러오지 못했습니다. (인터넷 연결·Leaflet 로드 확인)</div>;
  const noCoord = (points || []).length > 0 && valid.length === 0;
  return (
    <div>
      <div ref={ref} style={{ height: height || 360, borderRadius: 14, overflow: "hidden", border: "1px solid var(--border)" }} />
      <div style={{ fontSize: 11, color: "var(--soft)", marginTop: 6 }}>{noCoord ? "좌표 정보가 없어 위치를 표시할 수 없습니다." : "지도 © OpenStreetMap 기여자 · 좌표 출처: 심평원 공공데이터"}{points && points.length > MAP_CAP ? ` · 표시 ${MAP_CAP.toLocaleString()}/${points.length.toLocaleString()}곳(상위)` : ""}</div>
    </div>
  );
}

function MapCard({ title, points, accent, open, onToggle, focus, anchorRef }) {

}

      {view.map((p, i) => {
        const o = pharmOps(p[0], p[2]);
        return (
        <div className="center" key={i}>
          <div className="cimg" style={{ background: "linear-gradient(150deg,#DCFCE7,#D1FAE5)" }}><Art name="pill" size={46} /></div>

            <div className="cname">{p[0]}<span className="cbadge" style={{ color: "#15803D", background: "#E7F8EE" }}>약국</span>{o.night && <span className="cbadge" style={{ color: "#4338CA", background: "#E8EAFE" }}><Moon size={10} /> 야간</span>}{o.holiday && <span className="cbadge" style={{ color: "#B45309", background: "#FEF3E2" }}>공휴일</span>}</div>
            <div className="cmeta"><span style={{ fontWeight: 800, color: "#2563EB" }}>{data.sido[p[1]]} {p[2]}</span> · <MapPin size={12} />{p[3]}{p[4] ? <> · <Phone size={12} />{p[4]}</> : null}</div>
            <div className="cmeta" style={{ marginTop: 3 }}><Clock size={12} /> 평일 {o.weekday} · {o.sat} <span style={{ color: "var(--soft)" }}>(데모·추정)</span></div>
          </div>
          <div className="cright">
            {p[4] ? <a className="hlink" href={`tel:${p[4]}`}><Phone size={13} /> {p[4]}</a> : <span style={{ fontSize: 11.5, color: "var(--soft)" }}>전화정보 없음</span>}
            <div className="obtns"><button className="book" style={{ display: "inline-flex", alignItems: "center", gap: 5 }} disabled={!(p[5] && p[6])} onClick={() => showOnMap(p)}><MapPin size={13} /> 지도에서 보기</button></div>
          </div>
        </div>
        );
      })}
      {view.length === 0 && <div className="hload" style={{ marginTop: 8 }}>조건에 맞는 약국이 없습니다.</div>}
      {shown < list.length && <button className="cbtn" onClick={() => setShown((x) => x + 20)}>더 보기 ({(list.length - shown).toLocaleString()}곳 더)</button>}
      <div className="chnote">※ 약국 목록·주소·전화·좌표는 건강보험심사평가원 ‘전국 병의원 및 약국 현황({data.meta.asof})’ 공공데이터(공공누리 제1유형) 기반입니다. <b>영업시간·야간·공휴일 운영 표시는 데모용 예시(추정)</b>이며 실제와 다를 수 있습니다 — 실시간 운영정보는 약국 API(e약은요·심야약국 등) 연동 시 반영됩니다.</div>
    </>
  );
}

// 제휴 병원(데모): 전국 주요 대형병원 브랜드 키워드로 식별. 실제 제휴 DB 연동 시 대체.

function HospitalRec({ data, onGo }) {
  const [region, setRegion] = useState(PT.sido);
  const [detail, setDetail] = useState(null);
  const [sel, setSel] = useState(null);
  const atHome = region === PT.sido;

  const RECO = [
    { dept: "내과", ic: Stethoscope, col: "#7C3AED", bg: "#F1ECFE", why: "췌장암 경고 · 간 54.4세 · 당뇨 위험 ↑ — 복부초음파·위/대장 내시경·혈당 관리" },
    { dept: "영상의학과", ic: Activity, col: "#2563EB", bg: "#E8F1FE", why: "췌장·간 정밀영상 — 복부 초음파·CT 추적관찰" },
    { dept: "가정의학과", ic: HeartPulse, col: "#F59E0B", bg: "#FEF3E2", why: "만성질환·생활습관 통합관리 — 금연·절주·체중·대사" },
  ];
  const recoIdx = React.useMemo(() => RECO.map((r) => data.dept.indexOf(r.dept)).filter((i) => i >= 0), [data]);
  const recoSet = React.useMemo(() => new Set(recoIdx), [recoIdx]);

  const { partners, byGu, regionCount, distribution } = React.useMemo(() => {
    const sidoIdx = data.sido.indexOf(region);
    const matched = [];
    const dist = {};
    for (const h of data.hospitals) {
      let score = 0; for (const di of recoIdx) if (h[7].indexOf(di) >= 0) score++;
      if (score === 0) continue;
      dist[data.sido[h[2]]] = (dist[data.sido[h[2]]] || 0) + 1;
      if (h[2] !== sidoIdx) continue;
      matched.push({ h, score, partner: isPartner(h[0]) });
    }
    matched.sort((a, b) => (b.partner - a.partner) || (b.score - a.score) || (tpri(data.type[a.h[1]]) - tpri(data.type[b.h[1]])) || a.h[0].localeCompare(b.h[0], "ko"));
    const partners = matched.filter((m) => m.partner);
    const general = matched.filter((m) => !m.partner);
    const guMap = {};
    for (const m of general) (guMap[m.h[3]] || (guMap[m.h[3]] = [])).push(m);
    let byGu = Object.keys(guMap).map((gu) => ({ gu, items: guMap[gu], home: region === PT.sido && gu === PT.sigungu })).sort((a, b) => b.items.length - a.items.length);
    // 회원 거주 동네(은평구)를 맨 앞으로
    if (region === PT.sido) {
      const hi = byGu.findIndex((g) => g.home);
      if (hi > 0) { const home = byGu.splice(hi, 1)[0]; byGu.unshift(home); }
    }
    return { partners, byGu, regionCount: matched.length, distribution: dist };
  }, [data, region, recoIdx]);

  const sidoChips = React.useMemo(() => [...data.sido].sort((a, b) => SIDO_ORDER.indexOf(a) - SIDO_ORDER.indexOf(b)), [data]);
  const onBook = (h) => setSel(h);
  const onDetail = (h) => setDetail(h);

  return (<>
    <div className="airec">
      <div className="at"><Sparkles size={16} color="#7C3AED" /> 조성래님 맞춤 병원 추천</div>
      <div className="ap">프롬에이지 Premium 리포트(생체나이 52.5세 · <b>췌장암 경고</b> · 간 54.4세 · 당뇨 위험 ↑)를 분석해, 진료가 필요한 과목을 모두 갖춘 병원을 거주 지역에서 찾아드려요.</div>
    </div>
    <div className="card">
      <div className="rct"><Stethoscope size={18} color="#7C3AED" /> 건강상태 기반 권장 진료과</div>
      {RECO.map((r, i) => (
        <div className="adv" key={i}><span className="ic" style={{ background: r.bg }}><r.ic size={18} color={r.col} /></span>
          <div style={{ flex: 1 }}><b>{r.dept}</b><p>{r.why}</p></div>
          <button onClick={() => onGo({ sido: region, dept: r.dept })} style={{ alignSelf: "center", border: "1px solid var(--border)", background: "#fff", color: "var(--blue)", borderRadius: 9, padding: "7px 11px", fontWeight: 700, fontSize: 12, cursor: "pointer", whiteSpace: "nowrap" }}>{r.dept} ›</button></div>
      ))}
      <div className="chnote" style={{ marginTop: 4 }}>※ 권장 진료과는 조성래님 리포트의 장기 생체나이·질병위험·암 등급을 바탕으로 자동 산출됩니다. 아래 병원은 위 진료과를 <b>실제로 운영하는</b> 심평원 등록 병원입니다.</div>
    </div>

    <div className="bklbl" style={{ margin: "2px 0 8px", display: "flex", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
      <span><CircleUserRound size={13} style={{ verticalAlign: "-2px" }} /> 회원정보 거주지 <b style={{ color: "#2563EB" }}>{PT.addr}</b></span>
      {!atHome && <button className="fsel" style={{ padding: "3px 9px" }} onClick={() => setRegion(PT.sido)}>내 거주지로</button>}
      <span style={{ marginLeft: "auto", color: "var(--muted)" }}>맞춤 병원 <b style={{ color: "var(--blue)" }}>{regionCount.toLocaleString()}</b>곳</span>
    </div>
    <div className="regions">{sidoChips.map((r) => <div key={r} className={`fsel ${region === r ? "on" : ""}`} onClick={() => setRegion(r)}>{r === PT.sido && <Home size={11} style={{ verticalAlign: "-1px", marginRight: 3 }} />}{r}{distribution[r] ? <span style={{ color: "var(--soft)", fontWeight: 600, marginLeft: 4 }}>{distribution[r].toLocaleString()}</span> : ""}</div>)}</div>

    {partners.length > 0 && (
      <div className="card" style={{ border: "1.5px solid #BFD0FF", background: "linear-gradient(180deg,#F7F9FF,#fff)" }}>
        <div className="rct"><BadgeCheck size={18} color="#2F5BEA" /> 제휴 병원 <span style={{ fontSize: 12, color: "var(--muted)", fontWeight: 600 }}>· {region} {partners.length}곳</span></div>
        <div className="benefit" style={{ marginTop: 0, marginBottom: 12 }}><span><Art name="badge" size={16} /> 무료 검진보험 자동가입</span><span><Art name="calendar" size={16} /> 우선 예약</span><span><Art name="badge" size={16} /> NFT 예약증</span><span><Art name="doc" size={16} /> 검진·진료 통합관리</span></div>
        {partners.slice(0, 10).map((m, i) => <HospRow key={i} data={data} m={m} recoSet={recoSet} onDetail={onDetail} onBook={onBook} />)}
      </div>
    )}

    <div className="bklbl" style={{ margin: "2px 0 8px" }}><MapPin size={14} color="#2F5BEA" style={{ verticalAlign: "-2px" }} /> {region} 지역별 추천 병원 {atHome && <span style={{ fontSize: 11.5, color: "var(--muted)", fontWeight: 600 }}>· 내 동네({PT.sigungu}) 우선</span>}</div>
    {byGu.length === 0 && partners.length === 0 && <div className="hload">{region}에서 조건에 맞는 병원을 찾지 못했습니다. 다른 지역을 선택해 보세요.</div>}
    {byGu.slice(0, 6).map(({ gu, items, home }) => (
      <div className="card" key={gu} style={home ? { paddingBottom: 10, border: "1.5px solid #BFD0FF", background: "linear-gradient(180deg,#F7F9FF,#fff)" } : { paddingBottom: 10 }}>
        <div className="rct" style={{ marginBottom: 8 }}><MapPin size={16} color={home ? "#2F5BEA" : "#2563EB"} /> {gu} <span style={{ fontSize: 12, color: "var(--muted)", fontWeight: 600 }}>· {items.length}곳</span>{home && <span className="cbadge" style={{ color: "#fff", background: "linear-gradient(90deg,#2F5BEA,#7C3AED)" }}><Home size={10} /> 내 동네</span>}</div>
        {items.slice(0, 3).map((m, i) => <HospRow key={i} data={data} m={m} recoSet={recoSet} onDetail={onDetail} onBook={onBook} />)}
        {items.length > 3 && <button className="cbtn" style={{ marginTop: 4 }} onClick={() => onGo({ sido: region, sgg: gu, dept: "내과" })}>{gu} 추천 병원 더 보기 ({items.length - 3}곳 더) ›</button>}
      </div>
    ))}
    <div className="chnote">※ <b>제휴 병원 표시는 데모용 예시</b>(주요 대형병원 기준)이며, 실제 제휴 여부·우대 혜택은 제휴 병원 DB 연동 시 반영됩니다. 병원 목록·진료과목은 심평원 공공데이터({data.meta.asof}) 기반입니다.</div>
    {sel && <HospitalBookingModal data={data} h={sel} onClose={() => setSel(null)} />}
    {detail && <HospitalDetailModal data={data} h={detail} onClose={() => setDetail(null)} onBook={(x) => { setDetail(null); setSel(x); }} />}
  </>);
}

  return _homecarePromise;

}

function HomecareBookingModal({ data, p, onClose }) {
  const svcs = (p[5] || []).map((si) => data.svc[si]);
  const [pick, setPick] = useState(svcs[0] || "방문요양");
  const [done, setDone] = useState(false);
  const W = ["일", "월", "화", "수", "목", "금", "토"];
  const days = Array.from({ length: 8 }, (_, i) => { const d = new Date(); d.setDate(d.getDate() + i + 2); return d; });
  const [date, setDate] = useState(null);
  return (
    <div className="bkov" onClick={onClose}>
      <div className="bk" onClick={(e) => e.stopPropagation()}>
        <div className="bkh"><div className="bt">{done ? "상담 신청 완료" : "재가/돌봄서비스 상담 신청"}</div><button style={{ background: "none", border: "none", cursor: "pointer" }} onClick={onClose}><X size={20} color="#8A97AE" /></button></div>
        <div className="bkb">
          {!done ? (<>
            <div style={{ background: "#F7F9FC", border: "1px solid var(--border)", borderRadius: 12, padding: "12px 14px" }}>
              <div style={{ fontWeight: 800, fontSize: 14 }}>{p[0]} <span className="cbadge" style={{ color: "#9D174D", background: "#FCE7F3" }}>재가</span></div>
              <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 3 }}><MapPin size={11} style={{ verticalAlign: "-1px" }} /> {data.sido[p[1]]} {p[2]} · {p[3]}</div>
              <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 4 }}>신청자: <b style={{ color: "var(--text)" }}>{PT.name}</b> · {PT.sexAge}</div>
            </div>
            <div className="bklbl">희망 급여종류</div>
            <div className="ctags">{svcs.map((s) => <span key={s} onClick={() => setPick(s)} style={{ cursor: "pointer", background: pick === s ? "#EAF0FE" : undefined, borderColor: pick === s ? "#BFD0FF" : undefined, color: pick === s ? "#2563EB" : undefined, fontWeight: pick === s ? 800 : 600 }}>{s}</span>)}</div>
            <div className="bklbl">상담 희망일</div>
            <div className="cal">{days.map((d, i) => { const k = `${d.getMonth() + 1}/${d.getDate()}`; return (<div key={i} className={`calc ${date === k ? "on" : ""}`} onClick={() => setDate(k)}><div className="d">{d.getDate()}</div><div className="w">{W[d.getDay()]}</div></div>); })}</div>
            <button className="cbtn pri" style={{ opacity: date ? 1 : .5 }} disabled={!date} onClick={() => setDone(true)}><MessageSquare size={15} /> {date ? `${date} 상담 신청` : "상담 희망일을 선택하세요"}</button>
          </>) : (
            <div className="bkconfirm">
              <div className="ic"><Check size={30} color="#16A34A" /></div>
              <div style={{ fontWeight: 800, fontSize: 17 }}>상담 신청이 접수되었습니다</div>
              <div style={{ fontSize: 13, color: "var(--muted)", marginTop: 6 }}>{p[0]}<br />{pick} · {date}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 16, textAlign: "left" }}>
                <div className="resitem" style={{ margin: 0 }}><span className="ic" style={{ background: "#E7F8EE" }}><ShieldCheck size={18} color="#16A34A" /></span><div><b style={{ fontSize: 13 }}>장기요양 등급 확인</b><div style={{ fontSize: 11.5, color: "var(--muted)" }}>등급 보유 여부를 확인해 본인부담·이용 가능 급여를 안내합니다.</div></div></div>
                <div className="resitem" style={{ margin: 0 }}><span className="ic"><MessageSquare size={18} color="#7C3AED" /></span><div><b style={{ fontSize: 13 }}>담당자 연결</b><div style={{ fontSize: 11.5, color: "var(--muted)" }}>기관 담당자가 연락처로 상담을 진행합니다. (데모)</div></div></div>
              </div>
              <button className="cbtn pri" style={{ marginTop: 16 }} onClick={onClose}>확인</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── 보험사 로고: 로컬 공식 로고 → 로고 API → 파비콘 → 브랜드 컬러 폴백 ──
   data/logos/<slug>.(svg|png) 에 공식 로고 파일을 넣으면 그 로고가 1순위로 표시됩니다. */
function InsLogo({ n, c, domain, ab, slug }) {
  const exts = ["svg", "png", "jpg", "jpeg", "webp"];
  const SRCS = [
    ...(slug ? exts.map((e) => `./data/logos/${slug}.${e}`) : []),
    domain && `https://logo.clearbit.com/${domain}`,
    domain && `https://www.google.com/s2/favicons?domain=${domain}&sz=64`,
  ].filter(Boolean);
  const [i, setI] = useState(0);
  if (i >= SRCS.length) return <span className="lg" style={{ background: c }}>{ab}</span>;
  const isFav = SRCS[i].indexOf("s2/favicons") >= 0;
  return <img className={isFav ? "lgfav" : "lgimg"} src={SRCS[i]} alt={`${n} 로고`} loading="lazy" onError={() => setI((x) => x + 1)} />;
}

function ActivityGauge({ value }) {
  const r = 46, c = 2 * Math.PI * r, off = c * (1 - value / 100);
  return (<div style={{ textAlign: "center", flexShrink: 0 }}>
    <svg width="128" height="128" viewBox="0 0 120 120">
      <defs><linearGradient id="gg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#A855F7" /><stop offset="55%" stopColor="#6366F1" /><stop offset="100%" stopColor="#22C55E" /></linearGradient></defs>
      <circle cx="60" cy="60" r={r} fill="none" stroke="#EEF1F8" strokeWidth="12" />
      <circle cx="60" cy="60" r={r} fill="none" stroke="url(#gg4)" strokeWidth="12" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} transform="rotate(-90 60 60)" />
      <text x="60" y="52" textAnchor="middle" fontSize="11" fill="#697586" fontWeight="600">종합 활동지수</text>
      <text x="60" y="76" textAnchor="middle" fontSize="26" fontWeight="800" fill="#1E293B">{value}</text>
      <text x="78" y="76" textAnchor="start" fontSize="11" fill="#9AA6BC">/100</text></svg>
    <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>지난주 대비 <b style={{ color: "#EF4444" }}>▲ 8%</b></div></div>);
}

    else { const head = ["id", "name", "email", "biologicalAge", "cancerRiskGrade", "estimatedMedicalCost", "highRiskCancerTypes", "managementPoints"]; const esc = (v) => `"${String(v).replace(/"/g, '""')}"`; const rows = data.map((m) => [m.id, m.name, m.email, m.biologicalAge, m.cancerRiskGrade, m.estimatedMedicalCost, (m.highRiskCancerTypes || []).join("|"), (m.managementPoints || []).join("|")]); content = "﻿" + [head].concat(rows).map((r) => r.map(esc).join(",")).join("\r\n"); ext = "csv"; mime = "text/csv;charset=utf-8"; }
    try { const b = new Blob([content], { type: mime }); const url = URL.createObjectURL(b); const a = document.createElement("a"); a.href = url; a.download = `demo_members.${ext}`; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(() => URL.revokeObjectURL(url), 1500); toast(`데모 회원을 ${ext.toUpperCase()}로 내보냈습니다.`); } catch (e) { toast("내보내기에 실패했습니다."); }

function AuthSignup() {
  const [step, setStep] = useState(1);
  // 실명확인
  const [name, setName] = useState("");
  const [birth, setBirth] = useState("");
  const [gender, setGender] = useState("");
  const [carrier, setCarrier] = useState("");
  const [phone, setPhone] = useState("");
  const [code, setCode] = useState("");
  const [sentCode, setSentCode] = useState(null);
  const [verified, setVerified] = useState(false);
  // 계정
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [agree, setAgree] = useState(false);
  const [err, setErr] = useState("");

  const phoneDigits = phone.replace(/\D/g, "");
  const idOk = name.trim() && /^\d{6}$/.test(birth) && /^[1-4]$/.test(gender) && carrier && /^\d{10,11}$/.test(phoneDigits);
  const sendCode = () => {
    setErr("");
    if (!idOk) { setErr("이름·주민번호 앞 6자리·성별·통신사·휴대폰번호를 정확히 입력해 주세요."); return; }
    const c = String(100000 + (parseInt(phoneDigits.slice(-6) || "0", 10) % 900000)).slice(0, 6);
    setSentCode(c); setVerified(false); setCode("");
  };
  const verify = () => {
    setErr("");
    if (!sentCode) { setErr("먼저 인증번호를 받아 주세요."); return; }
    if (code.trim() !== sentCode) { setErr("인증번호가 일치하지 않습니다."); return; }
    setVerified(true);
  };
  const next = () => { setErr(""); if (!verified) { setErr("실명확인(본인인증)을 완료해 주세요."); return; } setStep(2); };
  const finish = (e) => {
    if (e) e.preventDefault();
    setErr("");
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { setErr("올바른 이메일 형식을 입력해 주세요."); return; }
    if (pw.length < 8) { setErr("비밀번호는 8자 이상이어야 합니다."); return; }
    if (pw !== pw2) { setErr("비밀번호가 일치하지 않습니다."); return; }
    if (!agree) { setErr("서비스 이용약관·개인정보 처리방침에 동의해 주세요."); return; }
    if ((typeof demoFindByEmail === "function" && demoFindByEmail(email)) || userFindByEmail(email)) { setErr("이미 가입된 이메일입니다."); return; }
    const prof = demoMakeProfile(name.trim(), email.trim(), birth, gender);
    prof.password = pw;
    userRegister(prof);
    authSet({ name: prof.name, email: prof.email, realVerified: true });
    demoSetSession(prof);
  };

  return (
    <div className="authform">
      <div className="authsteps">
        <span className={`astep ${step === 1 ? "on" : verified ? "done" : ""}`}>1 실명확인</span>
        <span className="astepline" />
        <span className={`astep ${step === 2 ? "on" : ""}`}>2 계정 생성</span>
      </div>

      {step === 1 && (<>
        <label className="authfield"><span className="authlabel">이름(실명)</span>
          <input className="authinput" value={name} onChange={(e) => setName(e.target.value)} placeholder="홍길동" /></label>
        <div className="authfield"><span className="authlabel">주민등록번호</span>
          <div className="authrrn">
            <input className="authinput" value={birth} onChange={(e) => setBirth(e.target.value.replace(/\D/g, "").slice(0, 6))} placeholder="앞 6자리(생년월일)" inputMode="numeric" />
            <span className="authdash">–</span>
            <input className="authinput authg" value={gender} onChange={(e) => setGender(e.target.value.replace(/\D/g, "").slice(0, 1))} placeholder="0" inputMode="numeric" maxLength={1} />
            <span className="authmask">● ● ● ● ● ●</span>
          </div>
        </div>
        <div className="authrow2">
          <label className="authfield"><span className="authlabel">통신사</span>
            <select className="authinput" value={carrier} onChange={(e) => setCarrier(e.target.value)}>
              <option value="">선택</option><option>SKT</option><option>KT</option><option>LG U+</option><option>알뜰폰</option>
            </select></label>
          <label className="authfield"><span className="authlabel">휴대폰번호</span>
            <input className="authinput" value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="010-1234-5678" inputMode="tel" /></label>
        </div>
        <button type="button" className="authbtn authghost" onClick={sendCode} disabled={verified}>인증번호 받기</button>
        {sentCode && (
          <div className="authcode">
            <div className="authcodemsg">인증번호가 발송되었습니다. <b className="democode">데모 환경 — 인증번호: {sentCode}</b><button type="button" className="authautofill" onClick={() => setCode(sentCode)}>자동입력</button></div>
            <div className="authquick">
              <input className="authinput" value={code} onChange={(e) => setCode(e.target.value.replace(/\D/g, "").slice(0, 6))} placeholder="인증번호 6자리" inputMode="numeric" disabled={verified} />
              <button type="button" className="authbtn authsmall" onClick={verify} disabled={verified}>확인</button>
            </div>
          </div>
        )}
        {verified && <div className="authok">✓ 실명확인이 완료되었습니다 ({name}님)</div>}
        {err && <div className="autherr">{err}</div>}
        <button type="button" className="authbtn authprimary" onClick={next}>다음 단계</button>
      </>)}

      {step === 2 && (<form onSubmit={finish}>
        <div className="authverified">✓ {name}님 실명확인 완료</div>
        <label className="authfield"><span className="authlabel">이메일</span>
          <input className="authinput" type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" autoComplete="username" /></label>
        <label className="authfield"><span className="authlabel">비밀번호(8자 이상)</span>
          <input className="authinput" type="password" value={pw} onChange={(e) => setPw(e.target.value)} placeholder="비밀번호" autoComplete="new-password" /></label>
        <label className="authfield"><span className="authlabel">비밀번호 확인</span>
          <input className="authinput" type="password" value={pw2} onChange={(e) => setPw2(e.target.value)} placeholder="비밀번호 재입력" autoComplete="new-password" /></label>
        <label className="authagree"><input type="checkbox" checked={agree} onChange={(e) => setAgree(e.target.checked)} /> 서비스 이용약관 및 개인정보 처리방침에 동의합니다.</label>
        {err && <div className="autherr">{err}</div>}
        <div className="authrow2">
          <button type="button" className="authbtn authghost" onClick={() => { setErr(""); setStep(1); }}>이전</button>
          <button type="submit" className="authbtn authprimary">가입 완료</button>
        </div>
      </form>)}
    </div>
  );
}

   백엔드 없는 데모이므로 파일은 base64로 브라우저 localStorage에만 저장(회원별 키). */
function ReportVault({ user }) {
  const key = "hifin_reports_" + ((user && user.email) || "default");
  const load = () => { try { return JSON.parse(localStorage.getItem(key) || "[]"); } catch (e) { return []; } };
  const [list, setList] = useState(load);
  const [agree, setAgree] = useState(false);
  const [msg, setMsg] = useState(null);
  const fileRef = useRef(null);
  const who = (user && user.name) || "조성래";

  const save = (l) => {
    try { localStorage.setItem(key, JSON.stringify(l)); } catch (e) { setMsg({ t: "저장 공간이 부족합니다. 기존 리포트를 삭제하거나 더 작은 파일을 올려주세요.", e: true }); return false; }
    setList(l); return true;
  };
  const onPick = (e) => {
    setMsg(null);
    const f = e.target.files && e.target.files[0]; if (!f) return;
    if (f.size > 3 * 1024 * 1024) { setMsg({ t: "3MB 이하 파일만 업로드할 수 있습니다 (브라우저 로컬 저장 제한).", e: true }); e.target.value = ""; return; }
    const reader = new FileReader();
    reader.onload = () => {
      const item = { id: "r" + new Date().getTime(), name: f.name, type: f.type || "", size: f.size, dataUrl: reader.result, date: new Date().toLocaleString("ko-KR") };
      if (save([item, ...list])) setMsg({ t: "검진 리포트가 업로드되었습니다.", e: false });
    };
    reader.onerror = () => setMsg({ t: "파일을 읽지 못했습니다. 다시 시도해 주세요.", e: true });
    reader.readAsDataURL(f);
    e.target.value = "";
  };
  const del = (id) => { setMsg(null); save(list.filter((r) => r.id !== id)); };
  const open = (r) => {
    const w = window.open("", "_blank");
    if (!w) { setMsg({ t: "팝업이 차단되었습니다. 팝업 허용 후 다시 시도해 주세요.", e: true }); return; }
    if ((r.type || "").indexOf("image") === 0) w.document.write('<title>' + r.name + '</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="' + r.dataUrl + '" style="max-width:100%;max-height:100vh"></body>');
    else w.location.href = r.dataUrl;
  };
  const isImg = (r) => (r.type || "").indexOf("image") === 0;

  return (
    <div className="card">
      <div className="rct"><FileText size={18} color="#2F5BEA" /> 검진 리포트 <span style={{ marginLeft: "auto", fontSize: 12, color: "var(--muted)" }}>{who}님 · {list.length}건</span></div>

      <div className="rvnote"><ShieldCheck size={16} color="#16A34A" style={{ flexShrink: 0, marginTop: 1 }} />
        <div><b>고객 동의 후</b> 외부 검진 시스템(healthketch.com)에서 발행한 건강검진 리포트를 업로드해 보관·확인하세요. 업로드한 파일은 <b>이 브라우저(기기)에만</b> 저장되며 외부로 전송되지 않습니다.</div></div>

      <label className="rvagree"><input type="checkbox" checked={agree} onChange={(e) => setAgree(e.target.checked)} /> 고객 본인의 동의를 받아 리포트를 등록합니다.</label>

      <div className="rvup">
        <input ref={fileRef} type="file" accept="application/pdf,image/*" style={{ display: "none" }} onChange={onPick} />
        <button className="rvbtn pri" disabled={!agree} onClick={() => fileRef.current && fileRef.current.click()}><Plus size={16} /> 리포트 업로드 (PDF·이미지)</button>
        <a className="rvbtn ghost" href="https://www.healthketch.com/outside/event/checkup-analysis/hizencare-pp-0UVIFW" target="_blank" rel="noopener noreferrer"><ExternalLink size={15} /> 발행 사이트 열기</a>
      </div>

      {msg && <div className={`rvmsg ${msg.e ? "err" : "ok"}`}>{msg.e ? <AlertTriangle size={14} /> : <Check size={14} />} {msg.t}</div>}

      {list.length === 0 ? (
        <div className="rvempty"><FileText size={30} color="#C2CCDD" /><div>아직 업로드된 검진 리포트가 없습니다.<br />동의 확인 후 발행된 리포트를 업로드해 주세요.</div></div>
      ) : (
        <div className="rvgrid">
          {list.map((r) => (
            <div className="rvitem" key={r.id}>
              <div className="rvthumb" onClick={() => open(r)} role="button" title="크게 보기">
                {isImg(r) ? <img src={r.dataUrl} alt={r.name} /> : <span className="rvpdf"><FileText size={30} color="#2F5BEA" /><em>PDF</em></span>}
              </div>
              <div className="rvmeta"><b title={r.name}>{r.name}</b><span>{r.date} · {(r.size / 1024).toFixed(0)}KB</span></div>
              <div className="rvact"><button onClick={() => open(r)}><ExternalLink size={13} /> 보기</button><button className="del" onClick={() => del(r.id)}><X size={13} /> 삭제</button></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ====================== 스포츠 임베디드 보험 (Sports Embedded Insurance) ====================== */
/* "운동은 자유롭게, 사고 대비는 자동으로" — 스포츠 활동에 자동 결합되는 임베디드 보험 소개 */
function SinsCountUp({ to, dur, suffix }) {
  const [v, setV] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    let raf, start, started = false, io, fb, finalT;
    const el = ref.current;
    const run = () => {
      if (started) return; started = true;
      const step = (t) => { if (!start) start = t; const p = Math.min(1, (t - start) / (dur || 1200)); setV(Math.round(to * (1 - Math.pow(1 - p, 3)))); if (p < 1) raf = requestAnimationFrame(step); };
      raf = requestAnimationFrame(step);
      finalT = setTimeout(() => setV(to), (dur || 1200) + 250); // rAF 미동작 시에도 최종값 보장
    };
    if (typeof IntersectionObserver !== "undefined" && el) {
      io = new IntersectionObserver((es) => es.forEach((e) => { if (e.isIntersecting) { run(); io.disconnect(); } }), { threshold: 0.3 });
      io.observe(el);
    }
    fb = setTimeout(run, 700); // 보장: IO 미동작 환경에서도 실행
    return () => { if (io) io.disconnect(); clearTimeout(fb); clearTimeout(finalT); if (raf) cancelAnimationFrame(raf); };
  }, [to, dur]);
  return <span ref={ref}>{v.toLocaleString("ko-KR")}{suffix || ""}</span>;
}

    )],
    ["등산 활동", (
      <div>등산 중 낙상사고 발생 시 <b>응급실 치료비 · 골절 진단비 · 구조·이송 비용</b>을 지원합니다.</div>
