/* ============================ HOOKS ============================ */
function useCountUp(target, dur=1100){
  const [v,setV]=useState(0);
  useEffect(()=>{
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches){ setV(target); return; }
    let raf, start;
    const step=(t)=>{ if(!start)start=t; const p=Math.min((t-start)/dur,1);
      setV(Math.round(target*(1-Math.pow(1-p,3)))); if(p<1) raf=requestAnimationFrame(step); };
    raf=requestAnimationFrame(step); return ()=>cancelAnimationFrame(raf);
  },[target]);
  return v;
}

function Gauge({score}){
  const v=useCountUp(score);
  const R=58, C=Math.PI*R; // semicircle length
  const off=C*(1-v/100);
  return (
    <div style={{position:"relative",width:160,height:96,margin:"0 auto"}}>
      <svg viewBox="0 0 160 90" width="160" height="90">
        <path d="M16 84 A64 64 0 0 1 144 84" fill="none" stroke="#F1E7DA" strokeWidth="14" strokeLinecap="round"/>
        <path d="M16 84 A64 64 0 0 1 144 84" fill="none" stroke="url(#gg)" strokeWidth="14"
          strokeLinecap="round" strokeDasharray={C} strokeDashoffset={off}
          style={{transition:"stroke-dashoffset .3s"}}/>
        <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stopColor="#F4843C"/><stop offset="1" stopColor="#FFB547"/></linearGradient></defs>
      </svg>
      <div style={{position:"absolute",bottom:2,left:0,right:0,textAlign:"center"}}>
        <div style={{fontSize:40,fontWeight:900,lineHeight:1,color:"var(--text)"}} className="num">{v}</div>
        <div style={{fontSize:12,color:"var(--muted)",fontWeight:700}}>/100</div>
      </div>
    </div>
  );
}

function ShopCatalog({cat,onAdd,onOpen}){
  const all=PRODUCTS.filter(p=>p.cat===cat);
  const [origin,setOrigin]=useState("전체");
  const [pet,setPet]=useState("전체");
  const [fn,setFn]=useState("전체");
  const [q,setQ]=useState("");
  const [sort,setSort]=useState("추천순");
  const fns=React.useMemo(()=>["전체",...new Set(all.flatMap(p=>p.health||[]))],[cat]);
  const list=React.useMemo(()=>{
    let out=all.filter(p=>(origin==="전체"||p.origin===origin)&&(pet==="전체"||p.pet===pet||p.pet==="공용")&&(fn==="전체"||(p.health||[]).includes(fn))&&(!q.trim()||p.name.includes(q)||p.brand.includes(q)));
    if(sort==="낮은가격")out=[...out].sort((a,b)=>(a.sale||a.price)-(b.sale||b.price));
    else if(sort==="높은가격")out=[...out].sort((a,b)=>(b.sale||b.price)-(a.sale||a.price));
    else out=[...out].sort((a,b)=>(b.ai?1:0)-(a.ai?1:0));
    return out;
  },[cat,origin,pet,fn,q,sort]);
  return (<>
    <div className="regions">
      {["전체","국내","국외"].map(o=><button key={o} className={`fsel ${origin===o?"on":""}`} onClick={()=>setOrigin(o)}>{o}</button>)}
      <span style={{width:1,background:"var(--border)",margin:"0 2px"}}/>
      {["전체","강아지","고양이"].map(o=><button key={o} className={`fsel ${pet===o?"on":""}`} onClick={()=>setPet(o)}>{o}</button>)}
    </div>
    <div className="regions">{fns.map(o=><button key={o} className={`fsel ${fn===o?"on":""}`} onClick={()=>setFn(o)}>{o==="전체"?"건강기능 전체":o}</button>)}</div>

      <div className="fsearch" style={{margin:0}}><Search size={15}/><input value={q} onChange={e=>setQ(e.target.value)} placeholder="상품명·브랜드 검색"/></div>
      <select value={sort} onChange={e=>setSort(e.target.value)}><option>추천순</option><option>낮은가격</option><option>높은가격</option></select>
    </div>
    <div className="chcount">{cat} <b style={{color:"var(--orange-deep)"}}>{list.length}</b>개</div>
    <div className="shopgrid">{list.map(p=><ProductCard key={p.id} p={p} onAdd={onAdd} onOpen={onOpen}/>)}</div>
    {list.length===0 && <div className="hload">조건에 맞는 상품이 없습니다.</div>}
    <div className="chnote">※ 상품·가격은 시연용 예시이며, 처방식 사료는 수의사 상담을 권장합니다.</div>
  </>);
}

function calculateTier(avg){ if(avg>=300000) return "VIP"; if(avg>=200000) return "프리미엄"; if(avg>=100000) return "골드"; return "기본회원"; }

/* ============================ AI 상담 (마루 주치의) ============================ */
function coachReply(text){
  const raw=text||""; const t=raw.replace(/\s/g,"");
  // 1) 응급 감지
  if(COACH_URGENT.some(k=>t.includes(k))){
    return { urgent:true, a:"⚠️ 응급 상황일 수 있어요. 지체 없이 가까운 24시·응급 동물병원에 연락하거나 방문하세요. 이물·중독(초콜릿·포도·양파 등)이 의심되면 먹은 것과 시간을 메모해 가시면 진료에 도움이 됩니다.", chips:["24시·응급 병원 찾기","보호자 거주지 병원"] };
  }
  // 2) 매칭되는 토픽 모두 수집 (증상 조합)
  const hits=COACH_QA.filter(q=>q.m.some(k=>t.includes(k)));
  if(hits.length===0){
    return { a:"마루의 건강검진·예방접종·체중·보험 정보를 바탕으로 답해드려요. 슬개골/치아/체중/혈액수치/예방접종/보험/소화기/기침/눈/피부 등에 대해 물어보세요. 정확한 진단·처방은 동물병원 수의사 상담을 권고드립니다.", chips:["건강점수 어때?","슬개골 괜찮아?","입냄새가 나요","설사를 해요"] };
  }
  if(hits.length===1){
    const q=hits[0];
    return { a:q.a, fu:q.fu, chips:q.chips };
  }
  // 여러 토픽 동시 언급 → 조합 답변
  const top=hits.slice(0,3);
  const a="여러 가지가 함께 궁금하시군요. 항목별로 정리해 드릴게요.\n\n"+top.map(q=>"• ["+q.k+"] "+q.a).join("\n\n");
  const chips=[...new Set(top.flatMap(q=>q.chips))].slice(0,4);
  return { a, fu:"가장 걱정되는 증상부터 더 자세히 살펴볼까요?", chips };
}
function AIConsultSection(){
  const [msgs,setMsgs]=useState([{r:"ai",t:"안녕하세요! 마루의 AI 주치의예요. 🐶 건강검진 결과와 예방접종·보험 정보를 알고 있어요. 무엇이 궁금하신가요?"}]);
  const [input,setInput]=useState("");
  const [chips,setChips]=useState(["건강점수 어때?","슬개골 괜찮아?","스케일링 필요해?","예방접종 일정","치료비 보장돼?"]);
  const logRef=useRef(null);
  useEffect(()=>{ if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight; },[msgs]);
  const ask=(text)=>{ if(!text||!text.trim())return; const r=coachReply(text);
    setMsgs(m=>{ const n=[...m,{r:"me",t:text},{r:"ai",t:r.a,urgent:r.urgent}]; if(r.fu) n.push({r:"ai",t:r.fu,fu:true}); return n; });
    setInput(""); if(r.chips)setChips(r.chips); };
  return (
    <div className="hsec">
      <div className="aihead"><span className="aiico"><Bot size={24} color="#fff"/></span>
        <div><div className="aih-t">AI 상담 · 마루 주치의</div><div className="aih-s">마루의 건강 데이터 기반 24시간 상담 <span style={{color:"var(--muted)"}}>(시연용 · 수의사 진단 대체 아님)</span></div></div></div>
      <div className="chatwrap">
        <div className="chatlog" ref={logRef}>
          {msgs.map((m,i)=><div key={i} className={`cbub ${m.r==="me"?"me":"ai"}${m.urgent?" urgent":""}${m.fu?" fu":""}`}>{m.r==="ai"&&!m.fu&&<div className="av"><Bot size={14}/> AI 주치의</div>}{m.fu&&<MessageCircle size={13} style={{verticalAlign:"-2px",marginRight:4}}/>}{m.t}</div>)}
        </div>
        <div className="chips">{chips.map((c,i)=><button key={i} className="chip" onClick={()=>ask(c)}>{c}</button>)}</div>
        <div className="chatbar"><input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")ask(input);}} placeholder="마루 건강에 대해 물어보세요"/><button onClick={()=>ask(input)}><Send size={18}/></button></div>
      </div>
      <div className="chnote">※ AI 상담은 마루의 데모 건강 데이터 기반 예시입니다. ‘진단/처방’이 아닌 정보 제공이며, 증상이 있으면 동물병원 수의사 상담을 권고합니다.</div>
    </div>
  );
}

function WeightSpark({data,target}){
  const ws=data.map(d=>d.w); const min=Math.min(...ws,target)-0.2, max=Math.max(...ws,target)+0.2;
  const W=300,Hh=110,pad=22;
  const X=(i)=>pad+i*(W-2*pad)/(data.length-1);
  const Y=(w)=>Hh-pad-((w-min)/(max-min))*(Hh-2*pad);
  const path=data.map((d,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Y(d.w).toFixed(1)).join(" ");
  const ty=Y(target);
  return (
    <svg viewBox={`0 0 ${W} ${Hh}`} width="100%" height={Hh} style={{overflow:"visible"}}>
      <line x1={pad} y1={ty} x2={W-pad} y2={ty} stroke="#4FB286" strokeWidth="1.2" strokeDasharray="4 4"/>
      <text x={W-pad} y={ty-5} fontSize="9" fill="#4FB286" textAnchor="end" fontWeight="700">목표 {target}kg</text>
      <path d={path} fill="none" stroke="var(--orange)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {data.map((d,i)=>(<g key={i}>
        <circle cx={X(i)} cy={Y(d.w)} r="3.5" fill="#fff" stroke="var(--orange)" strokeWidth="2"/>
        <text x={X(i)} y={Y(d.w)-9} fontSize="9.5" fill="var(--sub)" textAnchor="middle" fontWeight="700" className="num">{d.w}</text>
        <text x={X(i)} y={Hh-5} fontSize="9.5" fill="var(--muted)" textAnchor="middle">{d.m}</text>
      </g>))}
    </svg>
  );
}

const PARTNER_KEYS = ["대학교 동물병원","대학동물병원","동물대학병원","VIP동물의료센터","이리온","해마루","청담우리","스카이동물메디컬","서울동물메디컬","고려동물","윈동물","아이엠디티","IMDT","헬프동물","24시","응급"];

function fmtTel(t){ if(!t) return ""; t=(""+t).replace(/[^0-9]/g,"");
  if(t.startsWith("02")){ if(t.length===10) return t.replace(/(02)(\d{4})(\d{4})/,"$1-$2-$3"); if(t.length===9) return t.replace(/(02)(\d{3})(\d{4})/,"$1-$2-$3"); }
  if(t.length===11) return t.replace(/(\d{3})(\d{4})(\d{4})/,"$1-$2-$3");
  if(t.length===10) return t.replace(/(\d{3})(\d{3})(\d{4})/,"$1-$2-$3");
  return t; }

let _petHospPromise=null;
function usePetHospitals(){
  const [s,setS]=useState({loading:true,error:null,data:null});
  useEffect(()=>{
    if(!_petHospPromise) _petHospPromise=fetch("./data/pet_hospitals.json").then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); });
    let alive=true;
    _petHospPromise.then(d=>alive&&setS({loading:false,error:null,data:d})).catch(e=>alive&&setS({loading:false,error:String(e.message||e),data:null}));
    return ()=>{alive=false;};
  },[]);
  return s;
}

let _leafletPromise=null;
function ensureLeaflet(){
  if(window.L) return Promise.resolve(window.L);
  if(_leafletPromise) return _leafletPromise;
  _leafletPromise=new Promise((res,rej)=>{
    const css=document.createElement("link"); css.rel="stylesheet"; css.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"; document.head.appendChild(css);
    const s=document.createElement("script"); s.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
    s.onload=()=>res(window.L); s.onerror=()=>rej(new Error("leaflet")); document.body.appendChild(s);
  });
  return _leafletPromise;
}

function MapView({points,height=260}){
  const ref=useRef(null), mapRef=useRef(null);
  const [err,setErr]=useState(false);
  useEffect(()=>{
    let dead=false;
    ensureLeaflet().then(L=>{
      if(dead||!ref.current) return;
      const pts=points.filter(p=>p.lat&&p.lng).slice(0,200);
      if(!mapRef.current){
        mapRef.current=L.map(ref.current,{scrollWheelZoom:false});
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap"}).addTo(mapRef.current);
        mapRef.current._grp=L.layerGroup().addTo(mapRef.current);
      }
      const map=mapRef.current; map._grp.clearLayers();
      const icon=L.divIcon({className:"",html:'<div style="width:16px;height:16px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:#F4843C;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>',iconSize:[16,16],iconAnchor:[8,16]});
      if(pts.length===0){ map.setView([36.4,127.8],7); }
      else{
        const b=[];
        pts.forEach(p=>{ const m=L.marker([p.lat,p.lng],{icon}).addTo(map._grp);
          m.bindPopup(`<b>${p.name}</b><br>${p.addr||""}${p.tel?"<br>☎ "+fmtTel(p.tel):""}`); b.push([p.lat,p.lng]); });
        if(b.length===1) map.setView(b[0],15); else map.fitBounds(b,{padding:[28,28]});
      }
      setTimeout(()=>map.invalidateSize(),120);
    }).catch(()=>setErr(true));
    return ()=>{dead=true;};
  },[points]);
  useEffect(()=>()=>{ if(mapRef.current){ mapRef.current.remove(); mapRef.current=null; } },[]);
  if(err) return <div className="hload">지도를 불러오지 못했습니다. (네트워크 차단 환경일 수 있습니다)</div>;
  return <div ref={ref} style={{height,borderRadius:14,overflow:"hidden",border:"1px solid var(--border)"}}/>;
}

function HospitalDirectory({data,preset}){
  const [sido,setSido]=useState(preset.sido||"전체");
  const [sgg,setSgg]=useState(preset.sgg||"전체");
  const [emer,setEmer]=useState(false);
  const [q,setQ]=useState("");
  const [shown,setShown]=useState(20);
  const [sel,setSel]=useState(null);
  const [detail,setDetail]=useState(null);
  useEffect(()=>{ setSido(preset.sido||"전체"); setSgg(preset.sgg||"전체"); setShown(20); },[preset]);
  const {sggBySido,countBySido}=React.useMemo(()=>{ const m={},c={}; for(const h of data.hospitals){ const s=data.sido[h[1]]; c[s]=(c[s]||0)+1; (m[s]||(m[s]=new Set())).add(h[2]); } return {sggBySido:m,countBySido:c}; },[data]);
  const sidoChips=React.useMemo(()=>["전체",...[...data.sido].sort((a,b)=>SIDO_ORDER.indexOf(a)-SIDO_ORDER.indexOf(b))],[data]);
  const sggOptions=React.useMemo(()=>sido==="전체"?[]:[...(sggBySido[sido]||[])].sort((a,b)=>a.localeCompare(b,"ko")),[sido,sggBySido]);
  const list=React.useMemo(()=>{
    const si=sido==="전체"?-1:data.sido.indexOf(sido); const qq=q.trim();
    return data.hospitals.filter(h=>(si<0||h[1]===si)&&(sgg==="전체"||h[2]===sgg)&&(!emer||isEmergency(h[0]))&&(!qq||h[0].indexOf(qq)>=0||h[3].indexOf(qq)>=0));
  },[data,sido,sgg,emer,q]);
  const view=list.slice(0,shown); const reset=()=>setShown(20);
  return (<>
    <div className="benefit">
      <span><Building2 size={15}/> 전국 동물병원 {data.meta.hospitals.toLocaleString()}곳</span>
      <span><Siren size={15}/> 24시·응급 동물병원</span>
      <span><CalendarCheck size={15}/> 실시간 예약</span>
      <span><Award size={15}/> NFT 예약증 발행</span>
    </div>
    <MapCard title={`동물병원 위치 지도 (${(sido==="전체"?"전국":sido)+(sgg!=="전체"?" "+sgg:"")} ${list.length.toLocaleString()}곳)`} points={list.map(h=>({name:h[0],addr:h[3],tel:h[4],lng:h[5],lat:h[6]}))}/>
    <div className="bklbl">지역(시·도) 선택</div>
    <div className="regions">{sidoChips.map(r=><button key={r} className={`fsel ${sido===r?"on":""}`} onClick={()=>{setSido(r);setSgg("전체");reset();}}>{r==="서울특별시"&&<Home size={11} style={{verticalAlign:"-1px",marginRight:3}}/>}{r}{r!=="전체"&&countBySido[r]?<span className="cnt">{countBySido[r].toLocaleString()}</span>:""}</button>)}</div>
    <div className="hfilt">
      <select value={sgg} onChange={e=>{setSgg(e.target.value);reset();}} disabled={sido==="전체"}>
        <option value="전체">{sido==="전체"?"시·도 먼저 선택":"시·군·구 전체"}</option>
        {sggOptions.map(s=><option key={s} value={s}>{s}</option>)}
      </select>
      <button className={`fsel big ${emer?"on":""}`} onClick={()=>{setEmer(v=>!v);reset();}}><Siren size={13} style={{verticalAlign:"-2px"}}/> 24시·응급만</button>
    </div>
    <div className="filterbar">
      <div className="fsearch"><Search size={15}/><input value={q} onChange={e=>{setQ(e.target.value);reset();}} placeholder="병원명·주소 검색"/></div>
    </div>
    <div className="chcount">{sido==="전체"?"전국":sido}{sgg!=="전체"?" "+sgg:""}{emer?" · 24시·응급":""} <b style={{color:"var(--orange-deep)"}}>{list.length.toLocaleString()}</b>곳</div>
    {view.map((h,i)=><HospRow key={i} data={data} h={h} onDetail={setDetail} onBook={setSel}/>)}
    {view.length===0 && <div className="hload">조건에 맞는 동물병원이 없습니다. 필터를 조정해 보세요.</div>}
    {shown<list.length && <button className="cbtn" onClick={()=>setShown(x=>x+20)}>더 보기 ({(list.length-shown).toLocaleString()}곳 더)</button>}
    <div className="chnote">※ 동물병원 목록·주소·전화·좌표는 지방행정인허가데이터(LOCALDATA) ‘동물병원’ 공공데이터({data.meta.asof} · 공공누리 제1유형) 기반으로, 영업 중 {data.meta.hospitals.toLocaleString()}곳을 수록했습니다(좌표 {data.meta.withCoord.toLocaleString()}곳). <b>24시·응급 표시는 상호명 기준 추정</b>이며, 실시간 진료시간·예약 슬롯은 제휴 동물병원 API 연동 시 반영됩니다. 의료기관 정보 제공은 이용자의 합리적 선택을 돕기 위한 것입니다.</div>
    {sel && <HospitalBookingModal data={data} h={sel} onClose={()=>setSel(null)}/>}
    {detail && <HospitalDetailModal data={data} h={detail} onClose={()=>setDetail(null)} onBook={x=>{setDetail(null);setSel(x);}}/>}
  </>);
}

function HospitalRec({data,onGo}){
  const [region,setRegion]=useState(PET_LOC.sido);
  const [detail,setDetail]=useState(null), [sel,setSel]=useState(null);
  const atHome=region===PET_LOC.sido;
  const {emergency,byGu,regionCount,distribution}=React.useMemo(()=>{
    const si=data.sido.indexOf(region); const dist={}; const inR=[];
    for(const h of data.hospitals){ dist[data.sido[h[1]]]=(dist[data.sido[h[1]]]||0)+1; if(h[1]===si) inR.push(h); }
    const emergency=inR.filter(h=>isEmergency(h[0])).slice(0,6);
    const guMap={}; for(const h of inR)(guMap[h[2]]||(guMap[h[2]]=[])).push(h);
    let byGu=Object.keys(guMap).map(gu=>({gu,items:guMap[gu],home:atHome&&gu.indexOf(PET_LOC.sigungu)>=0})).sort((a,b)=>b.items.length-a.items.length);
    if(atHome){ const hi=byGu.findIndex(g=>g.home); if(hi>0){ const home=byGu.splice(hi,1)[0]; byGu.unshift(home); } }
    return {emergency,byGu,regionCount:inR.length,distribution:dist};
  },[data,region]);
  const sidoChips=React.useMemo(()=>[...data.sido].sort((a,b)=>SIDO_ORDER.indexOf(a)-SIDO_ORDER.indexOf(b)),[data]);
  const RECO=[
    {t:"정기 건강검진",ic:Stethoscope,why:"건강점수 92 유지 — 연 1~2회 정기검진 권장"},
    {t:"치과 · 스케일링",ic:Smile,why:"치주질환 위험 중간 — 구강검진·스케일링 권장"},
    {t:"정형외과",ic:Bone,why:"슬개골 위험 중간 — 슬개골 탈구 검진·관절 관리"},
  ];
  return (<>
    <div className="airec">
      <div className="at"><Sparkles size={16} color="var(--orange)"/> 마루 맞춤 동물병원 추천</div>
      <div className="ap">AI 건강 예측(슬개골·치주질환 위험 <b>중간</b>)과 건강점수(<b>92</b>)를 분석해, 정기검진·치과·정형 진료가 가능한 동물병원을 거주 지역에서 찾아드려요.</div>
    </div>
    <div className="card">
      <div className="rct"><Stethoscope size={18} color="var(--orange)"/> 마루에게 권장되는 진료</div>
      {RECO.map((r,i)=><div className="adv" key={i}><span className="ic"><r.ic size={18} color="var(--orange)"/></span><div style={{flex:1}}><b>{r.t}</b><p>{r.why}</p></div></div>)}
      <div className="chnote" style={{marginTop:4}}>※ 권장 진료는 마루의 AI 건강 예측·건강점수 기반 예시입니다. 정확한 진단·처방은 동물병원 수의사 상담을 권고합니다.</div>
    </div>
    <div className="bklbl spread"><span><User size={13} style={{verticalAlign:"-2px"}}/> 보호자 거주지 <b style={{color:"var(--orange-deep)"}}>{PET_LOC.addr}</b></span>{!atHome&&<button className="fsel" onClick={()=>setRegion(PET_LOC.sido)}>내 거주지로</button>}<span style={{marginLeft:"auto",color:"var(--muted)"}}>{region} <b style={{color:"var(--orange-deep)"}}>{regionCount.toLocaleString()}</b>곳</span></div>
    <div className="regions">{sidoChips.map(r=><button key={r} className={`fsel ${region===r?"on":""}`} onClick={()=>setRegion(r)}>{r===PET_LOC.sido&&<Home size={11} style={{verticalAlign:"-1px",marginRight:3}}/>}{r}{distribution[r]?<span className="cnt">{distribution[r].toLocaleString()}</span>:""}</button>)}</div>
    {emergency.length>0 && <div className="card emer">
      <div className="rct"><Siren size={18} color="#EF5B5B"/> 24시·응급 동물병원 <span className="sub">· {region} {emergency.length}곳</span></div>
      <div className="benefit" style={{marginBottom:10}}><span><Siren size={15}/> 야간·응급 진료</span><span><ShieldCheck size={15}/> 무상 임베디드 펫보험 자동 적용</span><span><Award size={15}/> NFT 예약증</span></div>
      {emergency.map((h,i)=><HospRow key={i} data={data} h={h} onDetail={setDetail} onBook={setSel}/>)}
    </div>}
    <div className="bklbl"><MapPin size={14} color="var(--orange)" style={{verticalAlign:"-2px"}}/> {region} 지역별 추천 동물병원 {atHome&&<span className="sub">· 내 동네({PET_LOC.sigungu}) 우선</span>}</div>
    {byGu.length===0 && <div className="hload">{region}에서 병원을 찾지 못했습니다. 다른 지역을 선택해 보세요.</div>}
    {byGu.slice(0,6).map(({gu,items,home})=><div className={`card ${home?"home":""}`} key={gu}>

      {items.length>3 && <button className="cbtn" onClick={()=>onGo({sido:region,sgg:gu})}>{gu} 추천 병원 더 보기 ({items.length-3}곳 더) ›</button>}
    </div>)}
    <div className="chnote">※ <b>24시·응급·제휴 표시는 상호명 기준 데모 예시</b>이며, 실제 제휴·우대 혜택은 제휴 동물병원 DB 연동 시 반영됩니다. 목록은 LOCALDATA 공공데이터({data.meta.asof}) 기반입니다.</div>
    {sel && <HospitalBookingModal data={data} h={sel} onClose={()=>setSel(null)}/>}
    {detail && <HospitalDetailModal data={data} h={detail} onClose={()=>setDetail(null)} onBook={x=>{setDetail(null);setSel(x);}}/>}
  </>);
}

                <div className="resitem"><span className="ic gr"><ShieldCheck size={18} color="var(--green)"/></span><div><b>건강금융지갑에 예약 기록</b><div className="sub2">진료·검사 이력이 마루 건강지갑에 자동 기록됩니다.</div></div></div>
                <div className="resitem"><span className="ic pu"><Award size={18} color="#8A63D2"/></span><div><b>NFT 예약증 발행</b><div className="sub2">지갑에 SBT 예약증이 발행되고 알림이 발송됩니다.</div></div></div>
                <div className="resitem"><span className="ic or"><FileSignature size={18} color="var(--orange)"/></span><div><b>무상 임베디드 펫보험 자동 적용</b><div className="sub2">치료 발생 시 예상 본인부담금이 자동 계산됩니다. (예시)</div></div></div>

    <div style={{display:"flex",minHeight:"100vh"}}>
      <Sidebar active={active} setActive={setActive} open={open} onClose={()=>setOpen(false)}/>
      <main style={{flex:1,minWidth:0,padding:"24px 28px 8px",display:"flex",flexDirection:"column"}}>
        <TopBar onMenu={()=>setOpen(true)}/>
        <QuickBar nav={setActive}/>
        {active==="병원/예약" ? (
          <HospitalSection/>
        ) : active==="건강관리" ? (
          <HealthManageSection/>
        ) : active==="보험" ? (
          <InsuranceSection/>
        ) : active==="AI 상담" ? (
          <AIConsultSection/>
        ) : active==="Health NFT" ? (
          <NftSection/>
        ) : active==="건강금융지갑" ? (
          <WalletSection/>
        ) : active==="리워드" ? (
          <RewardSection/>
        ) : active==="제품 쇼핑" ? (
          <ShopSection/>
        ) : active==="커뮤니티" ? (
          <CommunitySection/>
        ) : active==="마이페이지" ? (
          <MyPageSection/>
        ) : active!=="홈" ? (
          <div style={{flex:1,display:"grid",placeItems:"center",color:"var(--muted)",
            textAlign:"center",padding:"60px 0"}}>
            <div>
              <PawPrint size={56} color="var(--orange-soft)"/>
              <div style={{fontSize:18,fontWeight:800,color:"var(--sub)",marginTop:14}}>‘{active}’ 화면</div>
              <div style={{fontSize:14,marginTop:6}}>좌측 메뉴 10개 항목이 모두 구현되어 있습니다.<br/>해당 메뉴를 눌러 확인하세요.</div>
            </div>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            <div className="grid-3">
              <PetProfileCard/>
              <HealthSummaryCard/>
              <WalletCard/>
            </div>
            <div className="grid-3">
              <RecommendCard nav={setActive}/>
              <ScheduleCard/>
              <ActivityCard/>
            </div>
            <div className="grid-4">
              <RiskCard/>
              <SmartContractCard/>
              <TokenCard/>
              <NftCard/>
            </div>
          </div>
        )}
        <footer style={{textAlign:"center",fontSize:11.5,color:"var(--muted)",padding:"16px 0 20px",lineHeight:1.6}}>
          🐾 HI-PET · Pet Health-InsurFin Tech · App3 슈퍼 월렛 — 시연용 목업<br/>
          본 화면의 모든 건강·보험·자산 수치는 플랫폼 소개를 위한 예시(목업)이며, 수의학적 진단이나 구체적 보험금 지급을 보장하지 않습니다.
        </footer>
      </main>
    </div>
    </NavCtx.Provider>
  );
}

.instbl .ic.val{border-left:1px solid var(--border)}
.instbl .head{font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px}
.instbl .head.lbl{background:#EDF2F8;color:#45607D}
.instbl .head.lbl+.head,.instbl .head{border-left:1px solid rgba(255,255,255,.25)}
.instbl .subrow{background:var(--cream);font-weight:800;color:var(--orange-deep);font-size:12.5px}
.instbl .rlbl{font-weight:800;color:var(--text)}
.nowtag{font-size:9.5px;font-weight:800;background:rgba(255,255,255,.3);padding:1px 6px;border-radius:999px}
.ins-cards{display:none;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ins-card{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:#fff}
.ins-card .ich{color:#fff;font-weight:800;font-size:14px;padding:10px 12px;display:flex;align-items:center;gap:6px}
.ins-card .icb{padding:10px 12px}
.ins-card .icr{display:flex;justify-content:space-between;gap:8px;padding:6px 0;font-size:12.5px;border-bottom:1px solid var(--border)}
.ins-card .icr:last-child{border-bottom:none}
.ins-card .icr span{color:var(--sub);font-weight:600}
.infobox{background:#F5F1EC;border-radius:14px;padding:15px 17px;margin-bottom:14px;display:flex;flex-direction:column;gap:9px}
.ib-row{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--sub);line-height:1.6}
.ib-ico{width:24px;height:24px;border-radius:8px;background:#fff;display:grid;place-items:center;flex-shrink:0;box-shadow:var(--shadow-sm)}
.ins-cta{display:flex;gap:10px;margin-bottom:10px}
.ins-cta .cbtn{margin-top:0}
@media(max-width:760px){ .gc-stats{grid-template-columns:1fr} .instbl-wrap{display:none} .ins-cards{display:grid} .ins-cta{flex-direction:column} }
/* ===== 보험 (기존) ===== */
.covrow{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border)}
.covrow:last-of-type{border-bottom:none}
.covrow .ck{width:110px;font-size:13px;font-weight:700;flex-shrink:0}
.covrow .ctrk{flex:1;height:9px;background:#F1E7DA;border-radius:999px;overflow:hidden}
.covrow .cf{height:100%;border-radius:999px;background:linear-gradient(90deg,#F4843C,#FFB547)}
.covrow .cr{width:42px;text-align:right;font-weight:800;font-size:13px;color:var(--orange-deep)}
.estc{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:9px}
.estc .en{font-weight:800;font-size:14px}
.estc .er{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5}
.estc .ev{text-align:right;flex-shrink:0}
.estc .ev .self{font-size:19px;font-weight:900;color:var(--orange-deep)}
.estc .ev .cov{font-size:11.5px;color:var(--green);font-weight:700;margin-top:2px}
/* ===== 지갑 ===== */
.walhero{background:linear-gradient(135deg,var(--orange),var(--amber));border-radius:20px;padding:22px 24px;color:#fff;margin-bottom:14px;box-shadow:0 10px 26px rgba(244,132,60,.3)}
.walhero .wl{font-size:13px;opacity:.92;font-weight:600}
.walhero .wv{font-size:38px;font-weight:900;letter-spacing:-1.2px;margin-top:2px}
.walhero .wsub{display:flex;gap:22px;flex-wrap:wrap;margin-top:16px}
.walhero .wsub>div{font-size:12px;opacity:.95}
.walhero .wsub b{display:block;font-size:16px;font-weight:900;margin-top:3px}
/* ===== 리워드 센터 ===== */
.mrow{display:flex;align-items:center;gap:12px;padding:13px 0}
.mr-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mr-track{height:7px;background:#F1E7DA;border-radius:999px;overflow:hidden;margin-top:6px}
.mr-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#F4843C,#FFB547);transition:width 1s cubic-bezier(.2,.7,.2,1)}
.goarrow{flex-shrink:0;width:30px;height:30px;border-radius:9px;background:var(--cream);display:grid;place-items:center}
.goarrow:hover{background:var(--orange-soft)}
.erow{display:flex;align-items:center;gap:12px;padding:10px 0}
.erow .en2{font-size:13.5px;font-weight:700}
.erow .amt2{flex-shrink:0;font-size:13px;font-weight:900;color:var(--green);background:var(--green-soft);padding:4px 10px;border-radius:999px}
.linkmini{font-size:12px;font-weight:700;color:var(--orange-deep)}
.linkmini:hover{text-decoration:underline}
/* ===== AI 상담 ===== */
.chatwrap{background:#fff;border:1px solid var(--border);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;height:540px;box-shadow:var(--shadow-sm)}
.chatlog{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,#FFFDFB,#FFF7EF)}
.cbub{max-width:80%;padding:11px 14px;border-radius:16px;font-size:13.5px;line-height:1.65;white-space:pre-wrap}
.cbub.ai{align-self:flex-start;background:#fff;border:1px solid var(--border);border-bottom-left-radius:5px;color:var(--text)}
.cbub.me{align-self:flex-end;background:linear-gradient(135deg,var(--orange),var(--amber));color:#fff;border-bottom-right-radius:5px}
.cbub .av{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;color:var(--orange-deep);margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:7px;padding:11px 14px;border-top:1px solid var(--border);background:#fff}
.chip{font-size:12px;font-weight:700;color:var(--orange-deep);background:var(--orange-soft);border-radius:999px;padding:7px 12px;cursor:pointer;border:none;transition:background .14s}
.chip:hover{background:#FFD7B8}
.chatbar{display:flex;gap:9px;padding:12px 14px;border-top:1px solid var(--border);background:#fff;align-items:center}
.chatbar input{flex:1;border:1px solid var(--border);border-radius:999px;padding:11px 16px;font-family:inherit;font-size:14px;outline:none}
.chatbar input:focus{border-color:var(--orange)}
.chatbar button{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--amber));color:#fff;display:grid;place-items:center;flex-shrink:0}
.cbub.urgent{background:#FDE4E4;border-color:#F6B8B8;color:#B3261E;font-weight:600}
.cbub.fu{align-self:flex-start;background:var(--cream);border:1px dashed var(--border);color:var(--sub);font-size:12.5px;font-style:italic;padding:8px 12px}
/* ===== 갤러리 ===== */
.gallery{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:10px}
.gthumb{padding:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;aspect-ratio:16/11;cursor:pointer;transition:transform .15s,box-shadow .15s}
.gthumb:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(196,128,72,.16)}
.gthumb img{width:100%;height:100%;object-fit:cover;display:block}
.lbwrap{position:relative;max-width:92vw;max-height:88vh}
.lbwrap img{max-width:92vw;max-height:88vh;border-radius:14px;display:block;box-shadow:0 20px 50px rgba(0,0,0,.4)}
.lbx{position:absolute;top:-14px;right:-14px;background:#fff;border-radius:50%;width:36px;height:36px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
@media(max-width:860px){.gallery{grid-template-columns:repeat(3,1fr)}}
/* ===== NFT ===== */
.nftgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.nftc{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;transition:transform .18s,box-shadow .18s}
.nftc:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(196,128,72,.14)}
.nftc .shield{position:relative;width:64px;height:70px;margin:0 auto 10px}
.nftc .nt{font-size:13.5px;font-weight:800;line-height:1.3}
.nftc .nd{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.5}
.nftc .ndt{font-size:11px;color:var(--orange-deep);font-weight:700;margin-top:7px}
/* ===== 제품 쇼핑 ===== */
.tabbadge{margin-left:5px;background:#EF5B5B;color:#fff;font-size:10px;font-weight:800;border-radius:999px;padding:1px 6px;min-width:16px;display:inline-block;text-align:center}
.chtab.on .tabbadge{background:#fff;color:var(--orange-deep)}
.shopgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.prod{background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
.prod:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(196,128,72,.16)}
.pimg{position:relative;aspect-ratio:1/1;display:grid;place-items:center;font-size:46px;background:linear-gradient(150deg,#FFF6EC,#FFE9D6)}
.pbadge{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.pb{font-size:10px;font-weight:800;padding:2px 7px;border-radius:999px;color:#fff}
.pb.pur{background:#8A63D2}.pb.org{background:var(--orange)}.pb.grn{background:var(--green)}
.pbody{padding:11px 12px 12px;display:flex;flex-direction:column;flex:1}
.pbrand{font-size:11px;color:var(--muted);font-weight:700}
.pname{font-size:13.5px;font-weight:800;line-height:1.35;margin-top:2px;min-height:36px}
.ptags{display:flex;flex-wrap:wrap;gap:4px;margin:7px 0}
.ptags span{font-size:10.5px;font-weight:700;color:var(--orange-deep);background:var(--orange-soft);border-radius:6px;padding:2px 6px}
.ptags span.og{color:var(--sub);background:var(--cream)}
.pbot{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-top:auto}
.pprice{font-size:15px;font-weight:900}
.pprice s{font-size:11px;color:var(--muted);font-weight:600;margin-right:4px}
.pprice span{font-size:11px;font-weight:700;margin-left:1px}
.ptok{display:flex;align-items:center;gap:3px;font-size:10.5px;color:var(--orange-deep);font-weight:700;margin-top:2px}
.addbtn{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--orange),var(--amber));color:#fff;display:grid;place-items:center;flex-shrink:0}
.qty{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.qty button{width:30px;height:30px;font-size:16px;font-weight:800;color:var(--orange-deep);background:var(--cream)}
.qty span{width:34px;text-align:center;font-weight:800;font-size:13px}
.rmbtn{display:flex;align-items:center;gap:3px;font-size:11.5px;color:var(--muted);font-weight:700}
.payrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;font-size:13.5px;font-weight:600;color:var(--sub)}
.payrow.tgrow{border-top:1px solid var(--border)}
.payrow.tot{border-top:1px solid var(--border);font-size:15px;font-weight:900;color:var(--text)}
.payrow.tot .num{color:var(--orange-deep)}
/* ===== 마이페이지 토글/설정 ===== */
.setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0}
.setrow .sn{font-size:14px;font-weight:700}
.tgl{width:46px;height:26px;border-radius:999px;background:#E2D5C4;position:relative;transition:background .18s;flex-shrink:0}
.tgl.on{background:var(--green)}
.tgl .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on .knob{left:23px}
.linkrow{width:100%;display:flex;align-items:center;justify-content:space-between;padding:15px 16px;font-size:14px;font-weight:700;background:#fff}
.linkrow:hover{background:var(--cream)}
@media(max-width:1100px){.shopgrid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:860px){
  .statgrid{grid-template-columns:repeat(3,1fr)}
  .riskgrid,.hm2{grid-template-columns:1fr}
  .nftgrid{grid-template-columns:repeat(2,1fr)}
  .shopgrid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:680px){
  .cright{flex-direction:row;align-items:center}
  .cal{grid-template-columns:repeat(4,1fr)}
  .statgrid{grid-template-columns:repeat(2,1fr)}
  .nftgrid{grid-template-columns:1fr}
  .walhero .wv{font-size:30px}
  .drow{grid-template-columns:1.4fr 1fr auto;font-size:12px}
  .drow .dref{display:none}
  .drow.dhdr span:nth-child(3){display:none}
}
`;
document.head.appendChild(css);

createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
