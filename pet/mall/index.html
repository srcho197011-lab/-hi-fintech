  const fns=useMemo(()=>["전체",...new Set(all.flatMap(p=>p.health||[]))],[cat,products]);
  const list=useMemo(()=>{

    if(sort==="낮은가격")out=[...out].sort((a,b)=>(a.sale||a.price)-(b.sale||b.price));
    else if(sort==="높은가격")out=[...out].sort((a,b)=>(b.sale||b.price)-(a.sale||a.price));
    else if(sort==="적립순")out=[...out].sort((a,b)=>b.token-a.token);
    else out=[...out].sort((a,b)=>Number(b.ai?1:0)-Number(a.ai?1:0));
    return out;
  },[cat,products,origin,pet,fn,q,sort]);
  const Chip=({v,cur,set})=> <button className={`chip ${cur===v?"on":""}`} onClick={()=>set(v)}>{v}</button>;
  return (
    <div>
      <h1 className="h1">{cat}</h1>
      <div className="chips">{["전체","국내","국외"].map(v=><Chip key={v} v={v} cur={origin} set={setO}/>)}<span className="sep"/>{["전체","강아지","고양이"].map(v=><Chip key={v} v={v} cur={pet} set={setP}/>)}</div>
      <div className="chips">{fns.map(v=><button key={v} className={`chip ${fn===v?"on":""}`} onClick={()=>setF(v)}>{v==="전체"?"건강기능 전체":v}</button>)}</div>

/* ===== 장바구니 ===== */
const TOKEN_BAL=12450;
function CartView({cart,setCart,go}){
  const [useTok,setUseTok]=useState(false);
  const sub=cart.reduce((s,x)=>s+(x.p.sale||x.p.price)*x.q,0);
  const reward=cart.reduce((s,x)=>s+x.p.token*x.q,0);
  const tokUse=useTok?Math.min(TOKEN_BAL,sub):0;
  const total=sub-tokUse;
  const setQ=(id,d)=>setCart(c=>c.map(x=>x.p.id===id?{...x,q:Math.max(1,x.q+d)}:x));
  const rm=(id)=>setCart(c=>c.filter(x=>x.p.id!==id));
  if(cart.length===0) return <div className="empty"><Cart size={26}/><p>장바구니가 비어 있습니다.</p><button className="btn pri" onClick={()=>go("shop")}>쇼핑하러 가기</button></div>;

            <div className="qty"><button onClick={()=>setQ(x.p.id,-1)}>−</button><span>{x.q}</span><button onClick={()=>setQ(x.p.id,1)}>+</button></div>
            <button className="rm" onClick={()=>rm(x.p.id)}>삭제</button>
          </div>
        );})}
      </div>

        <div className="srow"><span>상품 금액</span><b>{won(sub)}</b></div>

/* ===== 관리자 (등록·삭제·CSV) ===== */
const CSV_COLS=["product_name","category","origin","target_pet","prescription_type","health_function","brand","price","sale_price","stock_quantity","token_reward","recommended_by_ai","insurance_linked"];
function parseCsv(t){ const rows=t.trim().split(/\r?\n/); const head=rows[0].split(",").map(h=>h.trim()); return rows.slice(1).filter(Boolean).map(line=>{ const c=line.split(","); const o={}; head.forEach((h,i)=>o[h]=(c[i]||"").trim()); return o; }); }
function csvToProduct(o){ const n=v=>v===""?null:Number(v); const b=v=>v==="true"||v==="1"; return { id:"x"+Math.abs(Math.random()*1e9|0)+(o.product_name||"").length, emoji:"🛍️", name:o.product_name, cat:o.category, origin:o.origin||null, pet:o.target_pet||null, presc:o.prescription_type||null, health:o.health_function?o.health_function.split(/[;|]/).map(s=>s.trim()).filter(Boolean):[], brand:o.brand||null, price:n(o.price)||0, sale:n(o.sale_price), stock:n(o.stock_quantity)||0, token:n(o.token_reward)||0, ai:b(o.recommended_by_ai), ins:b(o.insurance_linked) }; }
function Admin({products,setProducts}){
  const [f,setF]=useState({name:"",cat:"사료",brand:"",price:"",stock:"0",token:"0",ai:false,ins:false});
  const [prev,setPrev]=useState(null),[errs,setErrs]=useState([]);
  const addOne=()=>{ if(!f.name||!f.price)return alert("상품명·가격 필수"); setProducts(ps=>[{id:"x"+Date.now(),emoji:"🛍️",name:f.name,cat:f.cat,brand:f.brand,price:Number(f.price),stock:Number(f.stock),token:Number(f.token),ai:f.ai,ins:f.ins,health:[],origin:"국내",presc:"일반식"},...ps]); setF({...f,name:"",brand:"",price:""}); };
  const del=(id)=>setProducts(ps=>ps.filter(p=>p.id!==id));
  const onCsv=async(file)=>{ const t=await file.text(); const rows=parseCsv(t); const e=[]; rows.forEach((r,i)=>{ if(!r.product_name)e.push(`${i+2}행: product_name 누락`); if(!r.category)e.push(`${i+2}행: category 누락`); if(isNaN(Number(r.price)))e.push(`${i+2}행: price 숫자 아님`); }); setPrev(rows); setErrs(e); };
  const saveCsv=()=>{ setProducts(ps=>[...prev.map(csvToProduct),...ps]); setPrev(null); setErrs([]); alert("CSV 업로드 완료"); };
  return (
    <div>
      <h1 className="h1">상품 관리 (Admin)</h1>
      <div className="sumbox" style={{marginBottom:16}}>
        <b>상품 등록</b>
        <div className="agrid">
          <input className="inp" placeholder="상품명" value={f.name} onChange={e=>setF({...f,name:e.target.value})}/>
          <select className="inp" value={f.cat} onChange={e=>setF({...f,cat:e.target.value})}>{["사료","간식","용품"].map(c=><option key={c}>{c}</option>)}</select>
          <input className="inp" placeholder="브랜드" value={f.brand} onChange={e=>setF({...f,brand:e.target.value})}/>
          <input className="inp" placeholder="가격" value={f.price} onChange={e=>setF({...f,price:e.target.value})}/>
          <input className="inp" placeholder="재고" value={f.stock} onChange={e=>setF({...f,stock:e.target.value})}/>
          <input className="inp" placeholder="토큰적립" value={f.token} onChange={e=>setF({...f,token:e.target.value})}/>
          <label className="ck"><input type="checkbox" checked={f.ai} onChange={e=>setF({...f,ai:e.target.checked})}/> AI추천</label>
          <label className="ck"><input type="checkbox" checked={f.ins} onChange={e=>setF({...f,ins:e.target.checked})}/> 보험연계</label>
        </div>
        <button className="btn pri" onClick={addOne}>등록</button>
      </div>
      <div className="sumbox" style={{marginBottom:16}}>
        <b>CSV 대량 업로드</b>
        <p className="note">컬럼: {CSV_COLS.join(", ")} (health_function 은 ; 또는 | 로 구분)</p>
        <input type="file" accept=".csv" onChange={e=>e.target.files[0]&&onCsv(e.target.files[0])}/>
        {prev&&<div style={{marginTop:10}}>
          <div style={{fontSize:13,fontWeight:700}}>미리보기 {prev.length}건 {errs.length?<span style={{color:"#e53"}}>· 오류 {errs.length}</span>:<span style={{color:"var(--green)"}}>· 검증 통과</span>}</div>
          {errs.length>0&&<ul style={{color:"#e53",fontSize:12}}>{errs.slice(0,6).map((x,i)=><li key={i}>{x}</li>)}</ul>}
          <button className="btn pri" style={{marginTop:8}} disabled={errs.length>0} onClick={saveCsv}>검증된 {prev.length}건 저장</button>
        </div>}
      </div>
      <div className="sumbox">
        <b>상품 목록 ({products.length})</b>
        <div style={{overflowX:"auto",marginTop:8}}>
          <table className="atbl"><thead><tr>{["상품명","분류","브랜드","가격","재고","배지",""].map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>{products.map(p=>(<tr key={p.id}><td>{p.name}</td><td>{p.cat}</td><td>{p.brand}</td><td>{(p.sale||p.price).toLocaleString()}원</td><td>{p.stock}</td><td style={{fontSize:11}}>{p.ai?"AI ":""}{p.ins?"보험 ":""}{p.presc==="처방식"?"처방":""}</td><td><button className="rm" onClick={()=>del(p.id)}>삭제</button></td></tr>))}</tbody></table>
        </div>
      </div>
    </div>
  );
}

/* ===== App (해시 라우터) ===== */
const PETSITE = "../index.html"; // 펫 메인 앱으로 돌아가기
const PVER=2; // 카탈로그 버전 (DEFAULT_PRODUCTS 변경 시 +1 → 저장된 구버전 자동 갱신)
function App(){
  const [products,setProducts]=useState(()=>{
    if(LS.get("hipet_pver",0)!==PVER){ LS.set("hipet_pver",PVER); LS.set("hipet_products",DEFAULT_PRODUCTS); return DEFAULT_PRODUCTS; }
    const saved=LS.get("hipet_products",null); return saved&&saved.length?saved:DEFAULT_PRODUCTS;
  });
  const [cart,setCart]=useState(()=>LS.get("hipet_cart",[]));
  const [orders,setOrders]=useState(()=>LS.get("hipet_orders",[]));
  const [view,setView]=useState("shop");
  const [sel,setSel]=useState(null);
  const [params,setParams]=useState(null);
  useEffect(()=>LS.set("hipet_products",products),[products]);
  useEffect(()=>LS.set("hipet_cart",cart),[cart]);
  useEffect(()=>LS.set("hipet_orders",orders),[orders]);
  const go=(v,p)=>{ setParams(p||null); if(p&&p.q!==undefined){} setView(v); window.scrollTo(0,0); };
  const open=(p)=>{ setSel(p); setView("product"); window.scrollTo(0,0); };
  const add=(p,q=1)=>setCart(c=>{ const i=c.findIndex(x=>x.p.id===p.id); if(i>=0){ const n=[...c]; n[i]={...n[i],q:n[i].q+q}; return n; } return [...c,{p,q}]; });
  const buy=(p)=>{ add(p); setView("cart"); window.scrollTo(0,0); };
  const count=cart.reduce((s,x)=>s+x.q,0);
  const nav=[["사료","feed"],["간식","snack"],["용품","supplies"]];
  return (
    <div>
      <header className="hdr">
        <div className="hdr-in">
          <button className="logo" onClick={()=>go("shop")}><span className="lg-ic">🐾</span> HI-PET <span style={{color:"var(--text)"}}>Shop</span></button>
          <nav className="hnav">{nav.map(([t,v])=><button key={v} className={`hn ${view===v?"on":""}`} onClick={()=>go(v)}>{t}</button>)}</nav>

            <button className="hn" onClick={()=>go("orders")}><Receipt size={16}/> 주문</button>
            <button className="hn" onClick={()=>go("admin")}><Settings size={16}/> 관리자</button>
            <button className="cartbtn" onClick={()=>go("cart")}><Cart size={18}/>{count>0&&<span className="cbad">{count}</span>}</button>
            <a className="hn back2" href={PETSITE}><Home size={15}/> 펫 앱</a>
          </div>
        </div>
      </header>
      <main className="wrap">
        {view==="shop"&&<ShopHome products={products} go={go} open={open} add={add}/>}
        {view==="feed"&&<Category cat="사료" products={products} open={open} add={add} initialQ={params&&params.q}/>}
        {view==="snack"&&<Category cat="간식" products={products} open={open} add={add} initialQ={params&&params.q}/>}
        {view==="supplies"&&<Category cat="용품" products={products} open={open} add={add} initialQ={params&&params.q}/>}
        {view==="product"&&sel&&<Detail p={sel} go={go} add={add} buy={buy}/>}
        {view==="cart"&&<CartView cart={cart} setCart={setCart} go={go}/>}
        {view==="checkout"&&<Checkout cart={cart} params={params} clearCart={()=>setCart([])} go={go} addOrder={(o)=>setOrders(os=>[o,...os])}/>}
        {view==="orders"&&<Orders orders={orders} go={go}/>}
        {view==="admin"&&<Admin products={products} setProducts={setProducts}/>}
      </main>
      <footer className="ft">🐾 HI-PET Shop — 처방식 사료는 수의사 상담 권장 · AI 추천은 진단이 아닌 건강관리 참고 정보 · 결제는 데모(mock)입니다.</footer>
    </div>
  );
}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.prod{background:#fff;border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s}
.prod:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(196,128,72,.16)}
.pimg{position:relative;aspect-ratio:1/1;display:grid;place-items:center;font-size:46px;background:linear-gradient(150deg,#FFF6EC,#FFE9D6)}
.pbadge{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.pb{font-size:10px;font-weight:800;padding:2px 7px;border-radius:999px;color:#fff} .pb.pur{background:#8A63D2}.pb.org{background:var(--orange)}.pb.grn{background:var(--green)}
.pbody{padding:11px 12px;display:flex;flex-direction:column;flex:1}
.pbrand{font-size:11px;color:var(--muted);font-weight:700} .pname{font-size:13.5px;font-weight:800;line-height:1.35;margin-top:2px;min-height:36px}
.ptags{display:flex;flex-wrap:wrap;gap:4px;margin:7px 0} .ptags span{font-size:10.5px;font-weight:700;color:var(--orange-deep);background:var(--orange-soft);border-radius:6px;padding:2px 6px} .ptags span.og{color:var(--sub);background:var(--cream)}
.pbot{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-top:auto}
.pprice{font-size:15px;font-weight:900} .pprice s{font-size:11px;color:var(--muted);font-weight:600;margin-right:4px} .pprice span{font-size:11px;margin-left:1px}
.ptok{display:flex;align-items:center;gap:3px;font-size:10.5px;color:var(--orange-deep);font-weight:700;margin-top:2px}
.addbtn{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--orange),var(--amber));color:#fff;display:grid;place-items:center;flex-shrink:0}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;align-items:center} .sep{width:1px;height:18px;background:var(--border);margin:0 3px}
.chip{padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:700;color:var(--sub);background:#fff;border:1px solid var(--border)} .chip:hover{border-color:var(--orange)} .chip.on{color:#fff;background:linear-gradient(135deg,var(--orange),var(--amber));border-color:transparent}
.filtrow{display:flex;gap:8px;margin-bottom:10px} .fsearch{flex:1;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:0 13px} .fsearch svg{color:var(--muted)} .fsearch input{flex:1;border:none;outline:none;padding:11px 0;font-size:14px;background:transparent}
.filtrow select{border:1px solid var(--border);border-radius:12px;padding:0 12px;font-family:inherit;font-size:13.5px;font-weight:700;background:#fff}
.count{font-size:13px;color:var(--sub);font-weight:600;margin:4px 2px 10px}
.back{font-size:13px;font-weight:700;color:var(--orange-deep);margin-bottom:12px}
.detail{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.dimg{position:relative;aspect-ratio:1/1;border-radius:20px;background:linear-gradient(150deg,#FFF6EC,#FFE9D6);display:grid;place-items:center;font-size:84px}
.dprice{font-size:24px;font-weight:900;color:var(--orange-deep);margin-top:10px} .dprice s{font-size:15px;color:var(--muted);margin-right:8px}
.dtok{font-size:13px;font-weight:700;color:var(--orange-deep);margin-top:4px}
.aibox{margin-top:14px;background:linear-gradient(135deg,#FFF6EC,#FFEFDB);border:1px solid #F8E4C3;border-radius:14px;padding:13px} .aibox b{font-size:13px;color:var(--orange-deep);display:flex;align-items:center;gap:5px} .aibox p{margin:5px 0;font-size:13px;color:var(--sub)}
.dlist{margin:16px 0;display:flex;flex-direction:column} .dlist>div{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px} .dlist dt{color:var(--sub);font-weight:700;margin:0} .dlist dd{margin:0;text-align:right}
.warn{background:#F2E9FF;border:1px solid #D9C7F5;border-radius:14px;padding:13px} .warn b{color:#7C3AED;font-size:13px;display:flex;align-items:center;gap:5px} .warn p{margin:5px 0 0;font-size:13px;color:var(--sub)}
.dbtns{display:flex;gap:8px;margin-top:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 18px;border-radius:999px;font-weight:800;font-size:14px} .btn.pri{background:linear-gradient(135deg,var(--orange),var(--amber));color:#fff;box-shadow:0 5px 14px rgba(244,132,60,.32)} .btn.soft{background:var(--orange-soft);color:var(--orange-deep)} .btn.full{width:100%} .btn:disabled{opacity:.5}
.cartwrap{display:grid;grid-template-columns:1fr 320px;gap:22px} .cartwrap .empty{grid-column:1/-1}
.cline{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:9px}
.cl-img{width:54px;height:54px;border-radius:12px;background:linear-gradient(150deg,#FFF1E0,#FFE4CC);display:grid;place-items:center;font-size:26px;flex-shrink:0} .cl-n{font-weight:800;font-size:14px} .cl-m{font-size:12px;color:var(--sub);margin-top:3px}
.qty{display:flex;align-items:center;border:1px solid var(--border);border-radius:10px;overflow:hidden} .qty button{width:30px;height:30px;font-size:16px;font-weight:800;color:var(--orange-deep);background:var(--cream)} .qty span{width:32px;text-align:center;font-weight:800;font-size:13px}
.rm{font-size:12px;color:var(--muted);font-weight:700}
.sumbox{background:#fff;border:1px solid var(--border);border-radius:18px;padding:18px;height:fit-content}
.srow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;font-size:13.5px;color:var(--sub)} .srow.tg{border-top:1px solid var(--border)} .srow.tot{border-top:1px solid var(--border);font-size:15px;font-weight:900;color:var(--text)}
.lbl{font-size:13px;font-weight:700} .inp{width:100%;border:1px solid var(--border);border-radius:11px;padding:11px 13px;font-family:inherit;font-size:14px;outline:none;margin-top:5px} .inp:focus{border-color:var(--orange)}
.paybox{background:var(--cream);border-radius:12px;padding:10px 14px;margin-top:10px}
.resi{background:var(--cream);border-radius:12px;padding:11px 14px;font-size:13px}
.ocard{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.orow{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px} .ostat{font-size:12px;font-weight:800;color:var(--green);background:var(--green-soft);padding:2px 9px;border-radius:999px}
.olist{list-style:none;padding:0;margin:10px 0;font-size:13.5px} .olist li{display:flex;justify-content:space-between;padding:3px 0}
.ofoot{display:flex;justify-content:space-between;border-top:1px solid var(--border);padding-top:10px;font-size:13px} .ofoot .ok{font-size:12px;font-weight:700;color:var(--green)}
.agrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0} .ck{display:flex;align-items:center;gap:5px;font-size:13px}
.atbl{width:100%;border-collapse:collapse;font-size:13px} .atbl th{text-align:left;color:var(--muted);font-size:11.5px;padding:8px;background:var(--cream)} .atbl td{padding:8px;border-top:1px solid var(--border)}
.ft{max-width:1100px;margin:0 auto;padding:24px 18px;text-align:center;font-size:11.5px;color:var(--muted)}
@media(max-width:1000px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)} .detail{grid-template-columns:1fr} .cartwrap{grid-template-columns:1fr} .agrid{grid-template-columns:repeat(2,1fr)} .hnav{display:none}}
`;

createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
